<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeritageTraveler · Hotel-Kooperationen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'system-ui', 'sans-serif'],
            mono: ['Geist Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    :root { --bg: #fafafa; --card: #ffffff; --ink: #0a0a0a; --border: #e4e4e7; }
    body { background: var(--bg); color: var(--ink); }
    .card-shadow { box-shadow: 0 10px 30px rgba(0,0,0,.06); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn .25s ease both; }
    .tbl-wrap::-webkit-scrollbar { height: 8px; width: 8px; }
    .tbl-wrap::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 9999px; }
    thead th { position: sticky; top: 0; background: #fff; z-index: 1; }
  </style>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="font-sans antialiased text-sm">

  <!-- ===================== LOGIN ===================== -->
  <div id="auth-view" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm bg-white border border-zinc-200 rounded-xl card-shadow p-6 fade-in">
      <div class="mb-6">
        <div class="text-xs font-mono uppercase tracking-widest text-zinc-400 mb-1">HeritageTraveler</div>
        <h1 class="text-xl font-semibold">Anmelden</h1>
        <p class="text-zinc-500 text-xs mt-1">Hotel-Kooperationen verwalten</p>
      </div>
      <!-- Step 1: E-Mail + Sicherheitsprüfung -> Code anfordern -->
      <div id="step-email" class="space-y-3">
        <div>
          <label class="block text-xs text-zinc-500 mb-1">E-Mail</label>
          <input id="email" type="email" autocomplete="email" placeholder="dein@mail.com" required
            class="w-full px-3 py-2 rounded-lg border border-zinc-200 focus:outline-none focus:ring-2 focus:ring-zinc-900/10 focus:border-zinc-400" />
        </div>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADYwfAuC6X7RjQyT" data-theme="light"></div>
        <button type="button" id="request-code-btn"
          class="w-full py-2 rounded-lg bg-zinc-900 text-white font-medium hover:bg-zinc-800 transition-colors">
          Code per E-Mail anfordern
        </button>
      </div>

      <!-- Step 2: 6-stelligen Code eingeben -->
      <form id="code-form" class="space-y-3 hidden">
        <div>
          <label class="block text-xs text-zinc-500 mb-1">Code aus der E-Mail</label>
          <input id="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="6-stelliger Code"
            class="w-full px-3 py-2 rounded-lg border border-zinc-200 text-center tracking-widest font-mono focus:outline-none focus:ring-2 focus:ring-zinc-900/10 focus:border-zinc-400" />
        </div>
        <button type="submit" id="verify-code-btn"
          class="w-full py-2 rounded-lg bg-zinc-900 text-white font-medium hover:bg-zinc-800 transition-colors">
          Anmelden
        </button>
        <button type="button" id="back-to-email" class="w-full text-xs text-zinc-500 hover:text-zinc-900">andere E-Mail</button>
      </form>

      <p id="auth-msg" class="text-xs mt-3 hidden"></p>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app-view" class="hidden min-h-screen">
    <header class="border-b border-zinc-200 bg-white/80 backdrop-blur sticky top-0 z-20">
      <div class="max-w-[1400px] mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <div class="flex items-baseline gap-3">
          <span class="text-xs font-mono uppercase tracking-widest text-zinc-400">HeritageTraveler</span>
          <span id="count-badge" class="text-xs text-zinc-500"></span>
        </div>
        <div class="flex items-center gap-2">
          <span id="user-email" class="text-xs text-zinc-400 hidden sm:inline"></span>
          <button id="logout-btn" class="text-xs px-3 py-1.5 rounded-lg border border-zinc-200 hover:bg-zinc-50 transition-colors">Abmelden</button>
        </div>
      </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-4 py-4">

      <!-- ===================== TAB-LEISTE ===================== -->
      <div id="tab-bar" class="flex gap-1 mb-4 border-b border-zinc-200">
        <button data-tab="alle" class="tab-btn px-5 min-h-[44px] text-sm font-medium border-b-2 border-transparent text-zinc-500 hover:text-zinc-900 -mb-px">Alle</button>
        <button data-tab="hotels" class="tab-btn px-5 min-h-[44px] text-sm font-medium border-b-2 border-zinc-900 text-zinc-900 -mb-px">Hotels</button>
        <button data-tab="gruppen" class="tab-btn px-5 min-h-[44px] text-sm font-medium border-b-2 border-transparent text-zinc-500 hover:text-zinc-900 -mb-px">Gruppen</button>
      </div>

      <!-- ===================== HOTELS-PANEL (Alle + Hotels) ===================== -->
      <div id="hotels-panel">
      <div class="flex flex-wrap items-center gap-2 mb-3">
        <input id="search" type="search" placeholder="Suche: Hotel, Ort, Gruppe, E-Mail…"
          class="flex-1 min-w-0 w-full sm:w-auto sm:min-w-[200px] px-3 py-2 rounded-lg border border-zinc-200 bg-white focus:outline-none focus:ring-2 focus:ring-zinc-900/10" />
        <select id="filter-status" class="px-3 py-2 rounded-lg border border-zinc-200 bg-white text-zinc-700"></select>
        <select id="filter-land" class="px-3 py-2 rounded-lg border border-zinc-200 bg-white text-zinc-700"></select>
        <select id="filter-gruppe" class="px-3 py-2 rounded-lg border border-zinc-200 bg-white text-zinc-700"></select>
        <select id="group-by" class="px-3 py-2 rounded-lg border border-zinc-200 bg-white text-zinc-700">
          <option value="">Gruppierung: keine</option>
          <option value="land">nach Land</option>
          <option value="region">nach Region</option>
          <option value="gruppe">nach Gruppe</option>
          <option value="status">nach Status</option>
        </select>
        <button id="export-btn" class="px-3 py-2 rounded-lg border border-zinc-200 bg-white hover:bg-zinc-50 transition-colors whitespace-nowrap">CSV Export</button>
      </div>

      <!-- Quick-Filter (Schnellzugriffe) -->
      <div id="quick-chips" class="flex flex-wrap gap-2 mb-3"></div>

      <div id="status-summary" class="flex flex-wrap gap-2 mb-3"></div>

      <details class="mb-3 bg-white border border-zinc-200 rounded-xl card-shadow">
        <summary class="cursor-pointer select-none px-4 py-2.5 text-xs font-medium text-zinc-600 hover:text-zinc-900">Status-Legende — was bedeuten die Status?</summary>
        <div id="status-legend" class="px-4 pb-3 pt-1"></div>
      </details>

      <div class="bg-white border border-zinc-200 rounded-xl card-shadow overflow-hidden">
        <div class="tbl-wrap overflow-auto max-h-[calc(100vh-230px)]">
          <table class="w-full text-left border-collapse">
            <thead class="text-xs text-zinc-500 border-b border-zinc-200">
              <tr>
                <th data-sort="hotelname" class="px-3 py-2.5 font-medium cursor-pointer hover:text-zinc-900 select-none">Hotel</th>
                <th data-sort="land" class="px-3 py-2.5 font-medium cursor-pointer hover:text-zinc-900 select-none">Land</th>
                <th data-sort="region" class="px-3 py-2.5 font-medium cursor-pointer hover:text-zinc-900 select-none hidden md:table-cell">Region</th>
                <th data-sort="status" class="px-3 py-2.5 font-medium cursor-pointer hover:text-zinc-900 select-none">Status</th>
                <th data-sort="angefragt_am" class="px-3 py-2.5 font-medium cursor-pointer hover:text-zinc-900 select-none">Angefragt</th>
                <th class="px-3 py-2.5 font-medium hidden md:table-cell">Bemerkung</th>
                <th class="px-3 py-2.5 font-medium">Kontakt</th>
              </tr>
            </thead>
            <tbody id="hotels-body" class="divide-y divide-zinc-100"></tbody>
          </table>
        </div>
        <div id="empty-state" class="hidden p-8 text-center text-zinc-400 text-sm">Keine Treffer.</div>
      </div>
      </div><!-- /hotels-panel -->

      <!-- ===================== GRUPPEN-PANEL ===================== -->
      <div id="gruppen-panel" class="hidden">
        <div id="gruppen-body"></div>
      </div>
    </main>
  </div>

  <!-- ===================== E-MAIL MODAL ===================== -->
  <div id="email-modal" class="hidden fixed inset-0 z-40 bg-black/30 flex items-center justify-center px-4">
    <div class="w-full max-w-2xl bg-white border border-zinc-200 rounded-xl card-shadow p-5 fade-in max-h-[90vh] overflow-auto">
      <div class="flex items-start justify-between mb-3">
        <div>
          <h2 class="text-lg font-semibold" id="modal-hotel-name">Hotel</h2>
          <p class="text-xs text-zinc-500" id="modal-hotel-meta"></p>
        </div>
        <button id="modal-close" class="text-zinc-400 hover:text-zinc-900 text-xl leading-none">&times;</button>
      </div>

      <div id="modal-warning" class="space-y-2 mb-3 hidden"></div>

      <div class="space-y-3">
        <div>
          <label class="block text-xs text-zinc-500 mb-1">Empfänger</label>
          <div class="flex gap-2">
            <input id="modal-recipient" class="flex-1 px-3 py-2 rounded-lg border border-zinc-200 font-mono text-xs" readonly />
            <button data-copy="modal-recipient" class="copy-btn px-3 py-2 rounded-lg border border-zinc-200 hover:bg-zinc-50 text-xs whitespace-nowrap">Kopieren</button>
          </div>
        </div>

        <div>
          <label class="block text-xs text-zinc-500 mb-1">Vorlage</label>
          <select id="modal-template" class="w-full px-3 py-2 rounded-lg border border-zinc-200 bg-white"></select>
        </div>

        <div>
          <label class="block text-xs text-zinc-500 mb-1">Betreff</label>
          <div class="flex gap-2">
            <input id="modal-subject" class="flex-1 px-3 py-2 rounded-lg border border-zinc-200" />
            <button data-copy="modal-subject" class="copy-btn px-3 py-2 rounded-lg border border-zinc-200 hover:bg-zinc-50 text-xs whitespace-nowrap">Kopieren</button>
          </div>
        </div>

        <div>
          <label class="block text-xs text-zinc-500 mb-1">Text</label>
          <textarea id="modal-body" rows="12" class="w-full px-3 py-2 rounded-lg border border-zinc-200 font-mono text-xs leading-relaxed"></textarea>
        </div>

        <div class="flex items-center justify-between gap-2 pt-1">
          <span id="modal-copied" class="text-green-600 text-xs hidden">Kopiert ✓</span>
          <div class="flex gap-2 ml-auto">
            <button data-copy="modal-body" class="copy-btn px-4 py-2 rounded-lg bg-zinc-900 text-white text-sm font-medium hover:bg-zinc-800 transition-colors">Text kopieren</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/app.js?v=19" defer></script>
</body>
</html>
